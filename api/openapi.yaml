      properties:
        id: { type: string, format: uuid }
        provider: { type: string, enum: [jellyfin, emby, plex] }
        name: { type: string }
        enabled: { type: boolean }
        pendingCandidates: { type: integer, minimum: 0 }
        lastRunStatus: { type: string, enum: [running, succeeded, failed] }
        lastRunAt: { type: string, format: date-time }
    SyncStatus:
      type: object
      additionalProperties: false
