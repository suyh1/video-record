services:
  video-record:
    build:
      context: .
    image: video-record:local
    restart: unless-stopped
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      # Keep false for plain HTTP; set to "true" when served through HTTPS.
      APP_COOKIE_SECURE: "false"
      DATA_DIR: /data
      # Generate with `openssl rand -base64 32` before enabling media server integrations.
      APP_ENCRYPTION_KEY: ""
      TMDB_READ_ACCESS_TOKEN: ""
      # Optional when TMDB must be reached through an outbound proxy accessible from this container.
      # HTTPS_PROXY: "http://host.docker.internal:7890"
      # NO_PROXY: "localhost,127.0.0.1"
    volumes:
      - video_record_data:/data
    healthcheck:
      test: ["CMD", "/video-record", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 30s

volumes:
  video_record_data:
