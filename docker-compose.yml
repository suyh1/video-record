services:
  video-record:
    build:
      context: .
    image: video-record:local
    restart: unless-stopped
    user: "65532:65532"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      APP_COOKIE_SECURE: "false"
      DATA_DIR: /data
      APP_ENCRYPTION_KEY: ""
      TMDB_READ_ACCESS_TOKEN: ""
    volumes:
      - video_record_data:/data
    healthcheck:
      test: ["CMD", "/video-record", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 30s

volumes:
  video_record_data:
